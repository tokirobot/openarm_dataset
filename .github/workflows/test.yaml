name: Test
on:
  push:
    branches-ignore:
      - 'copilot/**'
  pull_request:
concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        extra:
          - lerobot-dataset-v2.1
          - lerobot-dataset-v3.0
          - rerun
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ffmpeg
      - name: Sync dependencies
        run: uv sync -p 3.12 --extra ${{ matrix.extra }}
      - name: Run pytest
        run: uv run pytest -rs
